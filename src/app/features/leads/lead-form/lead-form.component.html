<div class="space-y-6 max-w-2xl">
  <div class="flex items-center gap-4">
    <a routerLink="/leads" class="text-gray-400 hover:text-gray-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </a>
    <h1 class="text-2xl font-bold text-gray-900">{{ isEdit() ? 'Editar Lead' : 'Nuevo Lead' }}</h1>
  </div>

  @if (error()) {
    <div class="p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="card space-y-5">
    <div>
      <label class="form-label">Título del lead *</label>
      <input type="text" formControlName="title" class="form-input" placeholder="Interesado en casa en zona norte">
      @if (isInvalid('title')) { <p class="form-error">Requerido</p> }
    </div>
    <div>
      <label class="form-label">Cliente *</label>
      <select formControlName="clientId" class="form-input">
        <option value="">Seleccionar cliente...</option>
        @for (client of clients(); track client.id) {
          <option [value]="client.id">{{ client.firstName }} {{ client.lastName }} — {{ client.email }}</option>
        }
      </select>
      @if (isInvalid('clientId')) { <p class="form-error">Selecciona un cliente</p> }
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">Prioridad</label>
        <select formControlName="priority" class="form-input">
          <option value="low">Baja</option>
          <option value="medium">Media</option>
          <option value="high">Alta</option>
          <option value="urgent">Urgente</option>
        </select>
      </div>
      <div>
        <label class="form-label">Estado</label>
        <select formControlName="status" class="form-input">
          <option value="new">Nuevo</option>
          <option value="contacted">Contactado</option>
          <option value="qualified">Calificado</option>
          <option value="proposal">Propuesta</option>
          <option value="negotiation">Negociación</option>
          <option value="closed_won">Ganado</option>
          <option value="closed_lost">Perdido</option>
        </select>
      </div>
    </div>
    <div>
      <label class="form-label">Presupuesto (USD)</label>
      <input type="number" formControlName="budget" class="form-input" placeholder="150000">
    </div>
    <div>
      <label class="form-label">Fuente</label>
      <input type="text" formControlName="source" class="form-input" placeholder="Referido, Web, Portales...">
    </div>
    <div>
      <label class="form-label">Notas</label>
      <textarea formControlName="notes" class="form-input" rows="3" placeholder="Detalles del lead..."></textarea>
    </div>
    <div class="flex justify-end gap-3">
      <a routerLink="/leads" class="btn-secondary">Cancelar</a>
      <button type="submit" class="btn-primary flex items-center gap-2" [disabled]="saving()">
        @if (saving()) { <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> }
        {{ isEdit() ? 'Guardar' : 'Crear Lead' }}
      </button>
    </div>
  </form>
</div>
